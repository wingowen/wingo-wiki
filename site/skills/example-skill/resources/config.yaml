# 示例技能配置文件
# 用于配置技能的基本参数和设置

# 技能基本信息
skill:
  name: "示例技能"
  version: "1.0.0"
  description: "一个示例技能，展示如何按照 LLM Wiki Skill 维护规范组织技能内容"
  author: "System"
  created_at: "2026-04-16"
  updated_at: "2026-04-16"

# 技能功能配置
features:
  # 功能一配置
  feature_one:
    enabled: true
    description: "示例功能一"
    parameters:
      - name: "param1"
        type: "string"
        required: true
        description: "第一个参数"
      - name: "param2"
        type: "string"
        required: false
        description: "第二个参数"
    default_values:
      param2: "default_value"

  # 功能二配置
  feature_two:
    enabled: true
    description: "示例功能二"
    parameters:
      - name: "text"
        type: "string"
        required: true
        description: "文本参数"

# 脚本配置
scripts:
  example_script:
    path: "scripts/example_script.py"
    description: "示例脚本"
    usage: "python scripts/example_script.py --input <input_data> [--verbose]"

  validate_content:
    path: "scripts/validate_content.py"
    description: "内容验证脚本"
    usage: "python scripts/validate_content.py <skill_directory>"

# 资源配置
resources:
  examples:
    directory: "examples"
    files:
      - name: "example_usage.md"
        description: "使用示例"

  documentation:
    directory: "resources"
    files:
      - name: "config.yaml"
        description: "配置文件"

# 安全配置
security:
  input_validation: true
  error_handling: true
  external_links: true

# 性能配置
performance:
  timeout: 30
  max_retries: 3

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
